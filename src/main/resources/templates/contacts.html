<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Emergency Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">🚨 Manage Emergency Contacts</span>
        <a href="/dashboard" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- Add Contact Form -->
    <div class="card p-4 shadow mb-4">
        <h4>Add New Contact</h4>

        <form th:action="@{/contacts/add}" method="post">
            <input class="form-control mb-3" type="text" name="name" placeholder="Contact Name" required>
            <input class="form-control mb-3" type="text" name="phone" placeholder="Phone (+91...)" required>

            <button class="btn btn-success">Add Contact</button>
        </form>
    </div>

    <!-- Contact List -->
    <div class="card p-4 shadow">
        <h4>Your Contacts</h4>

        <table class="table table-striped mt-3">
            <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="contact : ${user.contacts}">
                <td th:text="${contact.name}"></td>
                <td th:text="${contact.phone}"></td>
                <td>
                    <form th:action="@{'/contacts/delete/' + ${contact.id}}" method="post">
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
