<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ResQlink Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-danger px-4">
    <span class="navbar-brand fw-bold">🚨 ResQlink</span>
    <a href="/" class="btn btn-sm btn-light">Logout</a>
</nav>

<div class="container mt-4">
    <h3 class="mb-4">
        Welcome, <span th:text="${user.name}"></span> 👋
    </h3>


<div class="container mt-4">

    <div class="row g-4">

        <!-- Device Card -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>🚗 Registered Device</h5>
                <p th:text="${user.devices[0].deviceId}"></p>
                <p><strong>Language:</strong> <span th:text="${user.preferredLanguage}"></span></p>
                <!-- Track Vehicle Button "TO BE CHANGED LATER"-->
                <a href="#" class="btn btn-success mt-2">
                     Track Vehicle
                </a>
            </div>
        </div>

        <!-- Contacts Card -->
        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>📞 Emergency Contacts</h5>
                <h2 th:text="${contactsCount}"></h2>
                <a href="/contacts" class="btn btn-primary mt-2">Manage Contacts</a>
            </div>
        </div>

        <!-- Accident Logs Card -->
        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>📊 Accident Logs</h5>
                <h2 th:text="${accidentCount}"></h2>
                <a href="/accidents" class="btn btn-danger mt-2">View Logs</a>
            </div>
        </div>

        <a href="/devices" class="btn btn-dark mt-2">Manage Devices</a>


    </div>

    <hr class="my-4">

    <div class="alert alert-success">
        System Status: <strong>Active & Monitoring</strong>
    </div>

</div>

</body>
</html>
