<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Create Account</h2>

        <form action="/register" method="post">
            <input class="form-control mb-3" type="text" name="name" placeholder="Name" required>
            <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
            <input class="form-control mb-3" type="text" name="phone" placeholder="Phone (+91...)" required>
            <select class="form-control mb-3" name="preferredLanguage" required>
                <option value="">Select Preferred Language</option>
                <option value="EN">English</option>
                <option value="HI">Hindi</option>
            </select>

            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-success w-100">Register</button>
        </form>
    </div>
</div>

</body>
</html>
