<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Accident Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">🚨 Accident History</span>
        <a href="/dashboard" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h4>Your Accident Records</h4>

        <table class="table table-striped mt-3">
            <thead>
            <tr>
                <th>Date & Time</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Map</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="accident : ${accidents}">
                <td th:text="${accident.time}"></td>
                <td th:text="${accident.latitude}"></td>
                <td th:text="${accident.longitude}"></td>
                <td>
                    <a th:href="'https://maps.google.com/?q=' + ${accident.latitude} + ',' + ${accident.longitude}"
                       target="_blank"
                       class="btn btn-sm btn-primary">
                        View Map
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

        <p th:if="${#lists.isEmpty(accidents)}" class="text-muted">
            No accident records found.
        </p>

    </div>

</div>

</body>
</html>
