<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Devices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">🚗 Manage Devices</span>
        <a href="/dashboard" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- Add Device -->
    <div class="card p-4 shadow mb-4">
        <h4>Register New Device</h4>

        <form th:action="@{/devices/add}" method="post">
            <input class="form-control mb-3"
                   type="text"
                   name="deviceId"
                   placeholder="Enter Device ID (e.g., CAR123)"
                   required>

            <button class="btn btn-success">Register Device</button>
        </form>
    </div>

    <!-- Device List -->
    <div class="card p-4 shadow">
        <h4>Your Registered Devices</h4>

        <table class="table table-striped mt-3">
            <thead>
            <tr>
                <th>Device ID</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="device : ${user.devices}">
                <td th:text="${device.deviceId}"></td>
                <td>
                    <form th:action="@{'/devices/delete/' + ${device.id}}"
                          method="post">
                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
